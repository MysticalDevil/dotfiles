<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
  <!-- rendering options -->
  <match target="font">
    <edit mode="assign" name="autohint">
      <bool>false</bool>
    </edit>
    <edit mode="assign" name="hinting">
      <bool>true</bool>
    </edit>
    <edit mode="assign" name="hintstyle">
      <const>hintslight</const>
    </edit>
    <edit mode="assign" name="antialias">
      <bool>true</bool>
    </edit>
    <edit mode="assign" name="lcdfilter">
      <const>lcddefault</const>
    </edit>
    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
  </match>

  <!-- keep emoji bitmaps, disable embedded bitmaps elsewhere -->
  <match target="font">
    <test name="family" compare="not_eq">
      <string>Twemoji</string>
    </test>
    <edit name="embeddedbitmap" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <!-- gvim still renders Twemoji badly when antialiasing is forced -->
  <match target="font">
    <test name="prgname" compare="eq">
      <string>gvim</string>
    </test>
    <test name="family" compare="eq">
      <string>Twemoji</string>
    </test>
    <edit mode="assign" name="antialias">
      <bool>false</bool>
    </edit>
  </match>

  <!-- modern web-ui aliases -->
  <include prefix="xdg">fontconfig/web-ui-fonts.conf</include>

  <!-- generic defaults: short fallback chains work better than giant lists -->
  <alias binding="strong">
    <family>sans-serif</family>
    <prefer>
      <family>Inter</family>
      <family>IBM Plex Sans</family>
      <family>Source Sans 3</family>
      <family>Noto Sans</family>
      <family>Symbols Nerd Font</family>
      <family>Twemoji</family>
      <family>Font Awesome 6 Free</family>
      <family>Font Awesome 6 Brands</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>sans</family>
    <prefer>
      <family>Inter</family>
      <family>IBM Plex Sans</family>
      <family>Source Sans 3</family>
      <family>Noto Sans</family>
      <family>Symbols Nerd Font</family>
      <family>Twemoji</family>
      <family>Font Awesome 6 Free</family>
      <family>Font Awesome 6 Brands</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>serif</family>
    <prefer>
      <family>Source Serif 4</family>
      <family>Noto Serif</family>
      <family>Symbols Nerd Font</family>
      <family>Twemoji</family>
      <family>Font Awesome 6 Free</family>
      <family>Font Awesome 6 Brands</family>
      <family>Noto Naskh Arabic</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>monospace</family>
    <prefer>
      <family>JetBrains Mono</family>
      <family>Iosevka Term</family>
      <family>Iosevka Fixed</family>
      <family>Noto Sans Mono</family>
      <family>Symbols Nerd Font Mono</family>
      <family>Twemoji</family>
      <family>Font Awesome 6 Free</family>
      <family>Font Awesome 6 Brands</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>emoji</family>
    <prefer>
      <family>Twemoji</family>
    </prefer>
  </alias>

  <!-- Windows / legacy family replacements -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>Courier</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>monospace</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>Roboto Mono</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>monospace</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>Microsoft YaHei</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Source Han Sans CN</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>微软雅黑</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Source Han Sans CN</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>SimSun</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Source Han Serif CN</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>NSimSun</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Source Han Serif CN</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>宋体</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Source Han Serif CN</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>新宋体</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Source Han Serif CN</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>黑体</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Source Han Sans CN</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>SimHei</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Source Han Sans CN</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>Mingliu</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Noto Serif CJK TC</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>PMingLiU</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Noto Serif CJK TC</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>細明體</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Noto Serif CJK TC</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>新細明體</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Noto Serif CJK TC</string>
    </edit>
  </match>

  <!-- region-aware CJK defaults -->
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-cn</string>
    </test>
    <test name="family" compare="eq">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Inter</string>
      <string>IBM Plex Sans</string>
      <string>Source Sans 3</string>
      <string>Source Han Sans CN</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-cn</string>
    </test>
    <test name="family" compare="eq">
      <string>serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Source Serif 4</string>
      <string>Noto Serif</string>
      <string>Source Han Serif CN</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-cn</string>
    </test>
    <test name="family" compare="eq">
      <string>monospace</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>JetBrains Mono</string>
      <string>Iosevka Term</string>
      <string>Source Han Mono SC</string>
      <string>Symbols Nerd Font Mono</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-hans</string>
    </test>
    <test name="family" compare="eq">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Inter</string>
      <string>IBM Plex Sans</string>
      <string>Source Sans 3</string>
      <string>Source Han Sans CN</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-hans</string>
    </test>
    <test name="family" compare="eq">
      <string>serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Source Serif 4</string>
      <string>Noto Serif</string>
      <string>Source Han Serif CN</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-hans</string>
    </test>
    <test name="family" compare="eq">
      <string>monospace</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>JetBrains Mono</string>
      <string>Iosevka Term</string>
      <string>Source Han Mono SC</string>
      <string>Symbols Nerd Font Mono</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-tw</string>
    </test>
    <test name="family" compare="eq">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Inter</string>
      <string>IBM Plex Sans</string>
      <string>Source Sans 3</string>
      <string>Noto Sans CJK TC</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-tw</string>
    </test>
    <test name="family" compare="eq">
      <string>serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Source Serif 4</string>
      <string>Noto Serif</string>
      <string>Noto Serif CJK TC</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-tw</string>
    </test>
    <test name="family" compare="eq">
      <string>monospace</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>JetBrains Mono</string>
      <string>Iosevka Term</string>
      <string>Source Han Mono TC</string>
      <string>Symbols Nerd Font Mono</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-hk</string>
    </test>
    <test name="family" compare="eq">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Inter</string>
      <string>IBM Plex Sans</string>
      <string>Source Sans 3</string>
      <string>Noto Sans CJK HK</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-hk</string>
    </test>
    <test name="family" compare="eq">
      <string>serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Source Serif 4</string>
      <string>Noto Serif</string>
      <string>Noto Serif CJK TC</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-hk</string>
    </test>
    <test name="family" compare="eq">
      <string>monospace</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>JetBrains Mono</string>
      <string>Iosevka Term</string>
      <string>Source Han Mono HC</string>
      <string>Symbols Nerd Font Mono</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <test name="family" compare="eq">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Inter</string>
      <string>IBM Plex Sans</string>
      <string>Source Sans 3</string>
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <test name="family" compare="eq">
      <string>serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Source Serif 4</string>
      <string>Noto Serif</string>
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <test name="family" compare="eq">
      <string>monospace</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>JetBrains Mono</string>
      <string>Iosevka Term</string>
      <string>Noto Sans Mono CJK JP</string>
      <string>Symbols Nerd Font Mono</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ko</string>
    </test>
    <test name="family" compare="eq">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Inter</string>
      <string>IBM Plex Sans</string>
      <string>Source Sans 3</string>
      <string>Noto Sans CJK KR</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ko</string>
    </test>
    <test name="family" compare="eq">
      <string>serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Source Serif 4</string>
      <string>Noto Serif</string>
      <string>Noto Serif CJK KR</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ko</string>
    </test>
    <test name="family" compare="eq">
      <string>monospace</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>JetBrains Mono</string>
      <string>Iosevka Term</string>
      <string>Noto Sans Mono CJK KR</string>
      <string>Symbols Nerd Font Mono</string>
    </edit>
  </match>

  <!-- aliases and compatibility names -->
  <alias binding="strong">
    <family>黑體</family>
    <accept>
      <family>黑体</family>
    </accept>
  </alias>
  <alias binding="strong">
    <family>FangSong</family>
    <accept>
      <family>FangSong_GB2312</family>
    </accept>
  </alias>
  <alias binding="strong">
    <family>仿宋</family>
    <accept>
      <family>仿宋_GB2312</family>
    </accept>
  </alias>
  <alias binding="strong">
    <family>KaiTi</family>
    <accept>
      <family>KaiTi_GB2312</family>
    </accept>
  </alias>
  <alias binding="strong">
    <family>KaiTi SC</family>
    <accept>
      <family>KaiTi_GB2312</family>
    </accept>
  </alias>
  <alias binding="strong">
    <family>楷体</family>
    <accept>
      <family>楷体_GB2312</family>
    </accept>
  </alias>
  <alias binding="strong">
    <family>Twemoji Mozilla</family>
    <accept>
      <family>Twemoji</family>
    </accept>
  </alias>

  <!-- Microsoft YaHei tends to look better without hinting tweaks -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>微软雅黑</string>
    </test>
    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintnone</const>
    </edit>
    <edit name="autohint" mode="assign">
      <bool>true</bool>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>Microsoft YaHei</string>
    </test>
    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintnone</const>
    </edit>
    <edit name="autohint" mode="assign">
      <bool>true</bool>
    </edit>
  </match>
</fontconfig>
