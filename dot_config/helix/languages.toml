# 只编译常用语言的 grammar，加快构建速度
use-grammars = { only = [
  "dockerfile", "yaml", "c", "cpp", "python",
  "javascript", "typescript", "tsx", "rust",
  "zig", "c-sharp", "toml", "json",
] }

[language-server]
# Python: ty (静态类型检查器)
ty = { command = "ty" }

# JS/TS: tsgo (TypeScript Go 重写版，实验性 LSP)
# 安装: npm install -g @typescript/native-preview
# 注意：tsgo LSP 仍处于早期开发阶段，部分功能可能不完整
tsgo = { command = "tsgo", args = ["--lsp", "--stdio"] }

[[language]]
name = "dockerfile"

[[language]]
name = "docker-compose"

[[language]]
name = "c"

[[language]]
name = "cpp"

[[language]]
name = "python"
language-servers = ["ty"]

[[language]]
name = "javascript"
language-servers = ["tsgo"]

[[language]]
name = "jsx"
language-servers = ["tsgo"]

[[language]]
name = "typescript"
language-servers = ["tsgo"]

[[language]]
name = "tsx"
language-servers = ["tsgo"]

[[language]]
name = "rust"

[[language]]
name = "zig"

[[language]]
name = "c-sharp"
language-servers = ["roslyn-language-server"]

[[language]]
name = "toml"
language-servers = ["taplo"]

[[language]]
name = "json"

[[language]]
name = "jsonc"
