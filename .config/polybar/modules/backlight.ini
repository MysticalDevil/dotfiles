[module/backlight]
type = internal/backlight

; Use the following command to list available cards:
; $ ls -1 /sys/class/backlight/
card = amdgpu_bl0
use-actual-brightness = true
enable-scroll = true

format = <ramp> <label>
format-background = ${color.BG}

; Available tokens:
;   %percentage% (default)
label = %percentage%%

; Only applies if <ramp> is used

ramp-0 = "ď—ť "
ramp-1 = "ď—ť "
ramp-2 = "ď—ť "
ramp-3 = "ď—ś "
ramp-4 = "ď—ś "
ramp-5 = "ď—ž "
ramp-6 = "ď—ž "
ramp-7 = "ď—ź "
ramp-8 = "ď—ź "
ramp-9 = "ď—ź "
ramp-font = 1
ramp-foreground = ${color.CYAN}
