
# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

continuation_prompt = "в–¶в–¶"

# Configure the format of the prompt
format = """$os\
        $username \
        $hostname\
        $shlvl\
        $kubernetes\
        $directory\
        $git_branch\
        $git_commit\
        $git_state\
        $git_status\
        $hg_branch\
        $docker_context\
        $package\
        (вҶ“ Toolchain version modules вҶ“)\
        $c\
        $cmake\
        $dart\
        $deno\
        $dotnet\
        $elixir\
        $erlang\
        $golang\
        $java\
        $kotlin\
        $lua\
        $nim\
        $nodejs\
        $ocaml\
        $perl\
        $php\
        $python\
        $ruby\
        $rust\
        $swift\
        $zig\
        (вҶ‘ Toolchain version modules вҶ‘)\
        $memory_usage\
        $env_var\
        $custom\
        $cmd_duration\
        (вҶ‘ above input line вҶ‘)\
        $line_break\
        (вҶ“ on input line вҶ“)\
        $jobs\
        $battery\
        $time\
        $status\
        $character\
    """

# Replace the 'вқҜ' symbol in the prompt with 'вһң'
[character]
success_symbol = '[вқҜ](bold green)'
error_symbol = '[вң—](bold red)'

[battery]
disabled = false
full_symbol = "п•ё"
charging_symbol = "п–ғ"
discharging_symbol = "п–Ӯ"
format = "[$symbol$percentage]($style) "
[[battery.display]]
threshold = 10
style = "red bold"

[cmd_duration]
format = '\[[вҸұ $duration]($style)\]'
style = "bold cyan"
min_time = 2_000
show_milliseconds = false

[directory]
format = "[пҗ“ $path]($style) [$read_only]($read_only_style) "
truncation_length = 2
style = "underline bold green"
read_only = "п Ҫ"
truncation_symbol = "../"

[hostname]
disabled = false
ssh_only = true
trim_at = "."
format = "[$hostname]($style) in "
style = "green dimmed bold"

[jobs]
disabled = false
threshold = 1
format = "[$symbol$number]($style) "
symbol = "вңҰ"
style = "bold blue"

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = 75
format = '\[$symbol[$ram( | $swap)]($style)\] '
style = "white bold dimmed"
symbol = "пЎҡ "

[os]
format = "[$symbol]($style) "
style = "bold #3E355A"
disabled = false

[os.symbols]
Alpine = "пҢҖ "
Amazon = "пү° "
Android = "п…» "
Arch = "пҢғ "
CentOS = "пҢ„ "
Debian = "пҢҶ "
DragonFly = "оҠҺ "
Emscripten = "пҲ… "
EndeavourOS = "пҶ— "
Fedora = "пҢҠ "
FreeBSD = "пҢҢ "
Garuda = "пҜ‘ "
Gentoo = "пҢҚ "
HardenedBSD = "пІҠ "
Illumos = "пң· "
Linux = "пҢҡ "
Macos = "пҢӮ "
Manjaro = "пҢ’ "
Mariner = "пҮҚ "
MidnightBSD = "пҶҶ "
Mint = "пҢҺ "
NetBSD = "пҖӨ "
NixOS = "пҢ“ "
OpenBSD = "пң№ "
openSUSE = "пҢ” "
OracleLinux = "п ¶ "
Pop = "оҠЈ "
Raspbian = "пҢ• "
Redhat = "пҢ– "
RedHatEnterprise = "пҢ– "
Redox = "п”— "
Solus = "пҙұ "
SUSE = "пҢ” "
Ubuntu = "пҢӣ "
Unknown = "пҲӯ "
Windows = "пЎұ "

[package]
format = '\[[$symbol$version]($style)\]'
symbol = 'рҹ“Ұ '
style = 'bold 208'
display_private = false

[shlvl]
disabled = true
threshold = 2
format = "[$symbol$shlvl]($style) "
symbol = "вҶ•"
style = "bold yellow"

[status]
disabled = true
format = "[$symbol$status]($style) "
symbol = "вң–"
style = "bold red"

[sudo]
style = "bold green"
symbol = "рҹ‘©вҖҚрҹ’» "

[username]
style_user = "bold bright-white"
style_root = "red bold"
format = "[пҖҮ $user]($style) in"
disabled = false
show_always = true

# ----------------------------- Version control system about ----------------------------
[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "red bold"
stashed = '\$'
ahead = "вҮЎ"
behind = "вҮЈ"
diverged = "вҮ•"
conflicted = "="
deleted = "вңҳ"
renamed = "В»"
modified = "!"
staged = "+"
untracked = "?"

[git_branch]
format = '\[[$symbol$branch]($style)\]'

# Mercurial
[hg_branch]
disabled = false
symbol = "пҗҳ "
style = "bold purple"
format = "on [$symbol$branch]($style) "
# truncation_length = 8 # default = 2^63 - 1
truncation_symbol = "вҖҰ"

# ------------------------------------- Docker about ------------------------------------
[docker_context]
format = '\[[$symbol$context]($style)\]'
symbol = 'рҹҗі '
style = 'blue bold'

[kubernetes]
format = '\[[$symbol$context( \($namespace\))]($style)\]'
symbol = "вҳё "
style = "cyan bold"

# ------------------------------ Language or Runtime about ------------------------------
[bun]
format = '\[[$symbol($version)]($style)\]'
symbol = 'рҹҚһ '
style = 'bold red'

[c]
format = '\[[$symbol($version(-$name))]($style)\]'
symbol = "оҳһ "
style = 'bold 149'

[cmake]
format = '\[[$symbol($version)]($style)\]'
symbol = 'M '
style = 'bold blue'

[dart]
format = '\[[$symbol($version)]($style)\]'
symbol = "оһҳ "
style = "bold blue"

[deno]
format = '\[[$symbol($version)]($style)\]'
symbol = 'рҹҰ• '
style = 'green bold'

[dotnet]
format = '\[[$symbol($version)(рҹҺҜ $tfm)]($style)\]'
symbol = "вҖўNET "
style = "blue bold"
heuristic = true

[elixir]
format = '\[[$symbol($version \(OTP $otp_version\))]($style)\]'
symbol = "оүө "
style = "bold purple"

[erlang]
format = '\[[$symbol($version)]($style)\]'
symbol = "оһұ "
style = "bold red"

[golang]
format = '\[[$symbol($version)]($style)\]'
symbol = "оҳ§ "
style = "bold cyan"

[haskell]
format = '\[[$symbol($version)]($style)\]'
symbol = "оқ· "
style = 'bold purple'

[java]
format = '\[[$symbol($version)]($style)\]'
style = "red dimmed"
symbol = "оү– "

[kotlin]
format = '\[[$symbol($version)]($style)\]'
symbol = 'оҳҙ '
style = 'bold bright-blue'

[lua]
format = '\[[$symbol($version)]($style)\]'
symbol = 'оҳ  '
style = 'bold blue'

[meson]
format = '\[[$symbol$project]($style)\]'
symbol = 'пЁө '
style = 'blue bold'

[nim]
format = '\[[$symbol($version)]($style)\]'
symbol = "пҡӨ "
style = "yellow bold"

[nodejs]
format = '\[[$symbol($version)]($style)\]'
symbol = 'оңҳ '
style = "bold green"

[ocaml]
format = '\[[$symbol($version)(\($switch_indicator$switch_name\))]($style)\]'
symbol = "рҹҗ« "
style = "bold yellow"

[perl]
format = '\[[$symbol($version)]($style)\]'
symbol = "оқ© "
style = "149 bold"

[php]
format = '\[[$symbol($version)]($style)\]'
symbol = 'рҹҗҳ '

[python]
format = '\[[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style)\]'
style = "yellow bold"
symbol = "оҳҶ "
pyenv_version_name = false
pyenv_prefix = "pyenv "
python_binary = "python"

[ruby]
format = '\[[$symbol($version)]($style)\]'
symbol = "оҲҫ "
style = "bold red"

[rust]
format = '\[[$symbol($version)]($style)\]'
symbol = 'рҹҰҖ '
style = "bold red"

[scala]
format = '\[[$symbol($version)]($style)\]'
symbol = "оң· "
style = 'red dimmed'

[swift]
disabled = false
format = '\[[$symbol($version)]($style)\] '
symbol = 'оқ• '
style = "bold 202"

[zig]
format = '\[[$symbol($version)]($style)\]'
symbol = 'вҶҜ '
style = 'bold yellow'
