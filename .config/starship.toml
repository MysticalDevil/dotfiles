
# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

continuation_prompt = "ÔûÂÔûÂ"

# Configure the format of the prompt
format = """$os\
        $username \
        $hostname\
        $shlvl\
        $kubernetes\
        $directory\
        $git_branch\
        $git_commit\
        $git_state\
        $git_status\
        $hg_branch\
        $docker_context\
        $package\
        (Ôåô Toolchain version modules Ôåô)\
        $c\
        $cmake\
        $dart\
        $deno\
        $dotnet\
        $elixir\
        $erlang\
        $golang\
        $java\
        $kotlin\
        $gradle\
        $lua\
        $fennel\
        $nim\
        $haxe\
        $nodejs\
        $ocaml\
        $perl\
        $php\
        $python\
        $ruby\
        $rust\
        $swift\
        $vlang\
        $zig\
        (Ôåæ Toolchain version modules Ôåæ)\
        $memory_usage\
        $env_var\
        $custom\
        $cmd_duration\
        (Ôåæ above input line Ôåæ)\
        $line_break\
        (Ôåô on input line Ôåô)\
        $jobs\
        $battery\
        $time\
        $status\
        $character\
    """

# Replace the 'ÔØ»' symbol in the prompt with 'ÔŞ£'
[character]
success_symbol = '[ÔØ»](bold green)'
error_symbol = '[Ô£ù](bold red)'
vimcmd_symbol = "[ÔØ«](bold green)"
vimcmd_replace_symbol = "[ÔØ«](bold purple)"
vimcmd_replace_one_symbol = "[ÔØ«](bold purple)"
vimcmd_visual_symbol = "[ÔØ«](bold yellow)"

[battery]
full_symbol = "¾░ü╣"
charging_symbol = "¾░éä"
discharging_symbol = "¾░éâ"
format = "[$symbol$percentage]($style) "
[[battery.display]]
threshold = 10
style = "bold red"

[cmd_duration]
format = '\[[´öá $duration]($style)\]'
style = "bold cyan"
show_milliseconds = false
show_notifications = false
min_time = 2_000
min_time_to_notify = 45000

[directory]
format = "[´ôô $path]($style) [$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "../"
style = "underline bold green"
read_only = "¾░î¥"
read_only_style = "italic red"

[hostname]
ssh_only = true
ssh_symbol = "¾░úÇ "
trim_at = "."
format = "[$hostname]($style) in "
style = " dimmed bold green"

[jobs]
threshold = 1
symbol_threshold = 1
number_threshold = 2
format = "[$symbol$number]($style) "
symbol = "Ô£Ğ"
style = "bold blue"

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = 75
format = '\[$symbol[$ram( | $swap)]($style)\] '
style = "bold dimmed white"
symbol = "¾░ıø "

[os]
format = "[$symbol]($style) "
style = "bold #DDDAEC"
disabled = false

[os.symbols]
Alpine = "´îÇ "
Amazon = "´ë░ "
Android = "´à╗ "
Arch = "´îâ "
CentOS = "´îä "
Debian = "´îå "
DragonFly = "¯èÄ "
Emscripten = "´êà "
EndeavourOS = "´åù "
Fedora = "´îè "
FreeBSD = "´îî "
Garuda = "¾░øô "
Gentoo = "´îı "
HardenedBSD = "¾░Şî "
Illumos = "¾░ê© "
Linux = "´îÜ "
Macos = "´îé "
Manjaro = "´îÆ "
Mariner = "´çı "
MidnightBSD = "´åå "
Mint = "´îÄ "
NetBSD = "´Çñ "
NixOS = "´îô "
OpenBSD = "¾░ê║ "
openSUSE = "´îö "
OracleLinux = "¾░îÀ "
Pop = "¯èú "
Raspbian = "´îò "
Redhat = "´îû "
RedHatEnterprise = "´îû "
Redox = "´öù "
Solus = "¾░á│ "
SUSE = "´îö "
Ubuntu = "´îø "
Unknown = "´ê¡ "
Windows = "¾░ı▓ "

[package]
format = '\[[$symbol$version]($style)\]'
symbol = '­şôĞ '
style = 'bold 214'
display_private = false

[shlvl]
disabled = true
threshold = 2
format = "[$symbol$shlvl]($style) "
symbol = "Ôåò"
style = "bold yellow"
repeat_offset = 0

[status]
format = "[$symbol$status]($style) "
style = "bold red"
symbol = "Ô£û"
success_symbol = ""
not_executable_symbol = "´üŞ"
not_found_symbol = "´Çé"
sigint_symbol = "´ü▒"
signal_symbol = "´ÇÆ"
recognize_signal_code = true
map_symbol = false
pipestatus = false
pipestatus_separator = "|"
pipestatus_format = '\[pipestatus\] => [symbolcommon_meaningsignal_namemaybe_int](style)'
pipestatus_segment_format = ""

[sudo]
format = "[as $symbol]($style)"
style = "bold green"
symbol = "´âÉ "

[username]
style_user = "bold bright-white"
style_root = "red bold"
format = "[´Çç $user]($style) in"
disabled = false
show_always = true

# ----------------------------- Version control system about ----------------------------
[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "red bold"
stashed = '\$'
ahead = "Ôçí"
behind = "Ôçú"
diverged = "Ôçò"
conflicted = "="
deleted = "Ô£İ"
renamed = "┬╗"
modified = "!"
staged = "+"
untracked = "?"
ignore_submodules = true

[git_branch]
format = '\[[$symbol$branch]($style)\]'
symbol = "¯£Ñ "
style = "bold purple"
always_show_remote = true
only_attached = false
ignore_branches = ["main", "master"]

[git_commit]
format = '[\($hash$tag\)]($style) '
style = "bold greee"
only_detached = true
commit_hash_length = 7
tag_symbol = " ¾░ô╣  "
tag_disabled = false
tag_max_candidates = 0

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold bright-yellow"
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"

[git_metrics]
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"
added_style = "bold green"
deleted_style = "bold red"
only_nonzero_diffs = true
ignore_submodules = true

# Mercurial
[hg_branch]
format = 'on [$symbol$branch]($style) '
symbol = "¾░İ¼ "
style = "bold purple"
truncation_length = 8                   # default = 2^63 - 1
truncation_symbol = "ÔÇĞ"
disabled = false

[pijul_channel]
format = 'on [$symbol$channel]($style) '
symbol = "¯éá "
style = "bold purple"
truncation_length = 10
truncation_symbol = "ÔÇĞ"
disabled = false

# ------------------------------------- Docker about ------------------------------------
[docker_context]
format = '\[[$symbol$context]($style)\]'
symbol = '¾░í¿ '
style = 'blue bold'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']

[kubernetes]
format = '\[[$symbol$context( \($namespace\))]($style)\]'
symbol = "Ôİ© "
style = "cyan bold"

[container]
format = '\[[$symbol($version)]($style)\]'
symbol = '´ÆÀ '
style = 'bold red dimmed'

[vagrant]
format = '\[[$symbol($version )]($style)\]'
symbol = "Ôı▒ "
style = "bold cyan"
detect_files = ["Vagrantfile"]

# ------------------------------ Language or Runtime about ------------------------------
[buf]
format = '\[[$symbol($version)]($style)\]'
symbol = '­şÉâ '
style = 'bold blue'
detect_files = ["buf.yaml", "buf.gen.yaml", "buf.work.yaml"]

[bun]
format = '\[[$symbol($version)]($style)\]'
symbol = '­şıŞ '
style = 'bold red'
detect_files = ["bun.lockb", "bunfig.toml"]

[c]
format = '\[[$symbol($version(-$name))]($style)\]'
symbol = "¯İŞ "
style = 'bold 149'
commands = [["cc", "--version"], ["gcc", "--version"], ["clang", "--version"]]
detect_extensions = ["c", "h"]

[cmake]
format = '\[[$symbol($version)]($style)\]'
symbol = '¾░öÂ C'
style = 'bold red'
detect_files = ["CMakeLists.txt", "CMakeCache.txt"]

[crystal]
format = '\[[$symbol($version)]($style)\]'
symbol = '¯İ» '
style = 'bold black'
detect_extensions = ["cr"]
detect_files = ["shard.yml"]

[dart]
format = '\[[$symbol($version)]($style)\]'
symbol = "¯Şİ "
style = "bold blue"
detect_extensions = ["dart"]
detect_files = ["pubspec.yaml", "pubspec.yml", "pubspec.lock"]
detect_folders = [".dart_tool"]

[deno]
format = '\[[$symbol($version)]($style)\]'
symbol = '­şĞò '
style = 'green bold'
detect_files = [
  "deno.json",
  "deno.jsonc",
  "mod.ts",
  "deps.ts",
  "mod.js",
  "deps.js",
]

[dotnet]
format = '\[[$symbol($version)(­şÄ» $tfm)]($style)\]'
symbol = "ÔÇóNET "
style = "blue bold"
heuristic = true
detect_extensions = ["csproj", "fsproj", "xproj"]
detect_files = [
  "global.json",
  "project.json",
  "Directory.Build.props",
  "Directory.Build.targets",
  "Packages.props",
]

[elixir]
format = '\[[$symbol($version \(OTP $otp_version\))]($style)\]'
symbol = "¯İ¡ "
style = "bold purple"
